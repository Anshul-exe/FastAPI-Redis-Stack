server {
    listen 80;
    server_name stack.anshulfml.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name stack.anshulfml.me;

    ssl_certificate /etc/letsencrypt/live/stack.anshulfml.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stack.anshulfml.me/privkey.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    client_max_body_size 10m;

    gzip on;
    gzip_types application/json text/plain text/html text/css application/javascript text/javascript;

    location / {
        proxy_pass http://app:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
}
