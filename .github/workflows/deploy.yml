name: Build, Push, and Deploy

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build the Docker image and push it to GHCR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taskapi:latest
            ghcr.io/${{ github.repository_owner }}/taskapi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 2: SSH into the VPS and redeploy using the freshly pushed image
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/taskapi

            # Pull the latest code (docker-compose files, configs, scripts)
            git pull origin main

            # Pull the newly published image from GHCR
            docker compose -f compose/docker-compose.prod.yml pull

            # Recreate changed containers; remove containers for removed services
            docker compose -f compose/docker-compose.prod.yml up -d --remove-orphans

            # Print running service status for the Actions log
            docker compose -f compose/docker-compose.prod.yml ps
